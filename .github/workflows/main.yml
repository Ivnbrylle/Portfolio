name: Portfolio CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://ivanrempis.dev --delete

      - name: Invalidate Distribution 1
        run: |
          aws cloudfront create-invalidation --distribution-id E26BLU4CAAFYVG --paths "/*"

      - name: Invalidate Distribution 2
        run: |
          aws cloudfront create-invalidation --distribution-id E3MSD3EADLS64V --paths "/*"
