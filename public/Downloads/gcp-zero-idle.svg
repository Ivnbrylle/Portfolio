<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#06b6d4" />
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Flows -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <!-- Dark slate background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />

  <!-- Grid lines for tech aesthetic -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Flow path 1 (GCS to Eventarc) -->
  <path d="M 220 225 H 350" fill="none" stroke="url(#flowGrad)" stroke-width="3" stroke-dasharray="8 4" />
  
  <!-- Flow path 2 (Eventarc to Cloud Run) -->
  <path d="M 410 225 H 480" fill="none" stroke="url(#flowGrad)" stroke-width="3" stroke-dasharray="8 4" />

  <!-- Flow path 3 (Cloud Run to Output GCS) -->
  <path d="M 580 225 H 710" fill="none" stroke="url(#flowGrad)" stroke-width="3" stroke-dasharray="8 4" />

  <!-- Input GCS Bucket Node -->
  <g transform="translate(80, 160)">
    <rect width="140" height="130" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
    <!-- Cylinder Icon -->
    <ellipse cx="70" cy="45" rx="25" ry="10" fill="none" stroke="#3b82f6" stroke-width="2" />
    <path d="M 45 45 V 75 C 45 85 95 85 95 75 V 45" fill="none" stroke="#3b82f6" stroke-width="2" />
    <path d="M 45 60 C 45 70 95 70 95 60" fill="none" stroke="#3b82f6" stroke-dasharray="3 2" stroke-width="1.5" />
    <text x="70" y="105" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">GCS Input Bucket</text>
  </g>

  <!-- Eventarc Trigger Node -->
  <g transform="translate(320, 165)">
    <circle cx="60" cy="60" r="50" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#glowBlue)" />
    <!-- Lightning Icon -->
    <path d="M 60 30 L 45 60 H 60 L 60 90 L 75 60 H 60 Z" fill="#06b6d4" />
    <text x="60" y="105" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" y="130">Eventarc Trigger</text>
  </g>

  <!-- Cloud Run Worker Service Node -->
  <g transform="translate(480, 160)">
    <rect width="140" height="130" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
    <!-- Cloud Run Logo / Abstract Icon -->
    <path d="M 70 35 L 45 65 H 95 Z" fill="none" stroke="#3b82f6" stroke-width="2" />
    <path d="M 70 50 L 55 75 H 85 Z" fill="#3b82f6" />
    <text x="70" y="100" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Cloud Run Worker</text>
    <text x="70" y="116" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Scales to Zero</text>
  </g>

  <!-- Output GCS Bucket Node -->
  <g transform="translate(580, 160)">
    <!-- Shifted right -->
    <g transform="translate(90, 0)">
      <rect width="140" height="130" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2" />
      <!-- File/PDF Icon -->
      <rect x="55" y="35" width="30" height="40" rx="2" fill="none" stroke="#06b6d4" stroke-width="2" />
      <line x1="62" y1="47" x2="78" y2="47" stroke="#06b6d4" stroke-width="2" />
      <line x1="62" y1="57" x2="78" y2="57" stroke="#06b6d4" stroke-width="2" />
      <line x1="62" y1="67" x2="72" y2="67" stroke="#06b6d4" stroke-width="2" />
      <text x="70" y="105" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">GCS Output Bucket</text>
    </g>
  </g>

  <!-- Label tags / Badges -->
  <g transform="translate(400, 40)">
    <text x="0" y="0" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="18" font-weight="900" letter-spacing="1.5" text-anchor="middle">ZERO-IDLE WORKER PIPELINE</text>
    <text x="0" y="20" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Event-Driven Asynchronous PDF Compilation on GCP</text>
  </g>
</svg>
