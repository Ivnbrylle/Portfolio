<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/Downloads/Logo.png" />
    <link rel="apple-touch-icon" href="/Downloads/Logo.png" />
    <title>Ivan Rempis — Cloud Engineer</title>
    <meta
      name="description"
      content="Ivan Rempis — Aspiring Cloud Engineer. AWS infrastructure, Terraform, DevOps automation and SRE."
    />
    <meta name="theme-color" content="#0f141c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark = t ? t === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
